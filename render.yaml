services:
  - type: web
    name: codecure-api
    env: python
    plan: free
    pythonVersion: 3.11.7
    buildCommand: "pip install -r requirements.txt && python train_toxicity_model.py"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port 8080"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.7
      - key: GROQ_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: ALLOWED_ORIGINS
        value: "http://localhost:3000,http://localhost:8000"
        sync: false
    preDeployCommand: "python train_toxicity_model.py"
    autoDeploy: true
